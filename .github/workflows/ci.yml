name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  backend:
    name: Backend Build + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore SkyBazaar.csproj

      - name: Build backend
        run: dotnet build SkyBazaar.csproj -c Release --no-restore

      - name: Restore tests
        run: dotnet restore SkyBazaar.Tests/SkyBazaar.Tests.csproj

      - name: Run tests
        run: dotnet test SkyBazaar.Tests/SkyBazaar.Tests.csproj -c Release --no-build --verbosity normal

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

